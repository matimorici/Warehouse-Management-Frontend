<div class="min-h-screen bg-gray-100 flex items-center justify-center">
  <div class="bg-white p-8 rounded-xl shadow-md w-full max-w-md">
    <h2 class="text-2xl font-bold text-gray-800 mb-6">Iniciar sesión</h2>

    <div
      *ngIf="errorMessage"
      class="bg-red-50 border border-red-300 text-red-700 px-4 py-3 rounded mb-4 text-sm"
    >
      {{ errorMessage }}
    </div>

    <form #loginForm="ngForm" (ngSubmit)="onSubmit()" class="space-y-4" novalidate>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">CUIL</label>
        <input
          type="text"
          [(ngModel)]="form.username"
          name="username"
          #usernameModel="ngModel"
          required
          class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-green-500"
        />
        <p
          *ngIf="usernameModel.touched && usernameModel.errors?.['required']"
          class="mt-1 text-sm text-red-600"
        >
          El usuario no puede estar vacío
        </p>
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Contraseña</label>
        <input
          type="password"
          [(ngModel)]="form.password"
          name="password"
          #passwordModel="ngModel"
          required
          class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-green-500"
        />
        <p
          *ngIf="passwordModel.touched && passwordModel.errors?.['required']"
          class="mt-1 text-sm text-red-600"
        >
          La contraseña no puede estar vacía
        </p>
      </div>

      <button
        type="submit"
        [disabled]="loginForm.invalid"
        class="w-full bg-green-600 hover:bg-green-700 text-white font-semibold py-2 rounded-lg transition-colors duration-200"
      >
        Iniciar sesión
      </button>
    </form>

    <p class="text-sm text-center text-gray-500 mt-4">
      ¿No tenés cuenta?
      <a routerLink="/register" class="text-green-600 hover:underline font-medium"> Registrate </a>
    </p>
  </div>
</div>
