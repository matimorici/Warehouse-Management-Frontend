<div class="min-h-screen bg-gray-100 flex items-center justify-center">
  <div class="bg-white p-8 rounded-xl shadow-md w-full max-w-md">
    <h2 class="text-2xl font-bold text-gray-800 mb-6">Crear cuenta</h2>

    <div
      *ngIf="errorMessage"
      class="bg-red-50 border border-red-300 text-red-700 px-4 py-3 rounded mb-4 text-sm"
    >
      {{ errorMessage }}
    </div>

    <div
      *ngIf="successMessage"
      class="bg-green-50 border border-green-300 text-green-700 px-4 py-3 rounded mb-4 text-sm"
    >
      {{ successMessage }}
    </div>

    <form (ngSubmit)="onSubmit()" class="space-y-4">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Nombre</label>
        <input
          type="text"
          [(ngModel)]="form.nombre"
          name="nombre"
          required
          class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-green-500"
        />
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Apellido</label>
        <input
          type="text"
          [(ngModel)]="form.apellido"
          name="apellido"
          required
          class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-green-500"
        />
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">CUIL</label>
        <input
          type="text"
          [(ngModel)]="form.cuil"
          name="cuil"
          placeholder="20-12345678-9"
          required
          class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-green-500"
        />
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Contraseña</label>
        <input
          type="password"
          [(ngModel)]="form.contrasena"
          name="contrasena"
          required
          class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-green-500"
        />
      </div>

      <button
        type="submit"
        class="w-full bg-green-600 hover:bg-green-700 text-white font-semibold py-2 rounded-lg transition-colors duration-200"
      >
        Registrarse
      </button>
    </form>

    <p class="text-sm text-center text-gray-500 mt-4">
      ¿Ya tenés cuenta?
      <a routerLink="/login" class="text-green-600 hover:underline font-medium"> Iniciá sesión </a>
    </p>
  </div>
</div>
